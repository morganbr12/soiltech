name: soiltech
description: "LBC Agent - Field Operations Platform for Licensed Buying Company Agents"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1

  # Local Storage
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0

  # UI & Design
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1

  # Utilities
  connectivity_plus: ^6.1.4
  intl: ^0.20.2
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  geolocator: ^13.0.2
  permission_handler: ^11.4.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
